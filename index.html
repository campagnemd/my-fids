<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departures</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Pretendard:wght@700;900&family=Roboto+Mono:wght@700&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #051126;
        }
        .font-mono { 
            font-family: 'Roboto Mono', 'Inter', monospace; 
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-white antialiased select-none">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SERVICE_KEY = "ca528dec987f974b71365a40543ca4c094fa0a3afe15441db4136e49edc7c72c";
        const CACHE_DURATION = 10 * 60 * 1000; 

        function App() {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [flights, setFlights] = useState([]);
            const [filteredFlights, setFilteredFlights] = useState([]);
            const [currentPage, setCurrentPage] = useState(0);
            
            // 🛠️ [신규 기능] 코드쉐어 표시 토글 상태 (기본값: 끄기/false)
            const [showCodeshare, setShowCodeshare] = useState(false);
            
            const itemsPerPage = 11; 

            const filteredFlightsRef = useRef([]);
            useEffect(() => {
                filteredFlightsRef.current = filteredFlights;
            }, [filteredFlights]);

            useEffect(() => {
                const clockTimer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(clockTimer);
            }, []);

            useEffect(() => {
                const pageTimer = setInterval(() => {
                    const totalItems = filteredFlightsRef.current.length;
                    if (totalItems > 0) {
                        const actualMaxPage = Math.ceil(totalItems / itemsPerPage);
                        const maxPageLimit = Math.min(actualMaxPage, 10); 
                        
                        setCurrentPage(p => (p + 1) % maxPageLimit);
                    }
                }, 10000); 

                return () => clearInterval(pageTimer);
            }, []);

            const getFormattedDate = (dateObj) => {
                const year = dateObj.getFullYear();
                const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                const day = String(dateObj.getDate()).padStart(2, '0');
                return `${year}${month}${day}`;
            };

            const fetchSingleDayData = async (dateStr, forceRefresh) => {
                const cacheKey = `fids_raw_data_${dateStr}`;
                const cachedTimeKey = `fids_raw_time_${dateStr}`;
                const cachedData = localStorage.getItem(cacheKey);
                const cachedTime = localStorage.getItem(cachedTimeKey);
                const nowTimestamp = Date.now();

                if (!forceRefresh && cachedData && cachedTime && (nowTimestamp - cachedTime < CACHE_DURATION)) {
                    try {
                        const parsed = JSON.parse(cachedData);
                        if (parsed && parsed.length > 0) return parsed;
                    } catch(e) {}
                }

                try {
                    const params = new URLSearchParams({
                        serviceKey: SERVICE_KEY,
                        type: 'json',
                        numOfRows: '1500', 
                        pageNo: '1',
                        searchDate: dateStr,     
                        searchdtCode: 'S',        
                        passengerOrCargo: 'P'     
                    });
                    const targetUrl = `/api/icn/B551177/statusOfAllFltDeOdp/getFltDeparturesDeOdp?${params.toString()}`;
                    const response = await fetch(targetUrl);
                    if (!response.ok) throw new Error("API Network Error");
                    
                    const data = await response.json();
                    if (data?.response?.header?.resultCode !== "00") throw new Error("API Data Error");
                    
                    const rawItems = data?.response?.body?.items || [];
                    const itemList = Array.isArray(rawItems) ? rawItems : [];
                    
                    if (itemList.length > 0) {
                        localStorage.setItem(cacheKey, JSON.stringify(itemList));
                        localStorage.setItem(cachedTimeKey, nowTimestamp.toString());
                        return itemList;
                    }
                    return [];
                } catch (err) {
                    console.error(`데이터 호출 실패 (${dateStr}):`, err);
                    try {
                        const backup = JSON.parse(cachedData);
                        if (backup && backup.length > 0) return backup;
                    } catch(e) {}
                    return [];
                }
            };

            const fetchFlightData = async (forceRefresh = false) => {
                const now = new Date();
                const currentHour = now.getHours();
                
                const todayStr = getFormattedDate(now);
                const yesterdayStr = getFormattedDate(new Date(now.getTime() - 24 * 60 * 60 * 1000));
                const tomorrowStr = getFormattedDate(new Date(now.getTime() + 24 * 60 * 60 * 1000));

                let targetDates = [todayStr];
                if (currentHour >= 0 && currentHour < 6) {
                    targetDates.unshift(yesterdayStr); 
                } else if (currentHour >= 18 && currentHour <= 23) {
                    targetDates.push(tomorrowStr);    
                }

                try {
                    const datasets = [];
                    for (const date of targetDates) {
                        const data = await fetchSingleDayData(date, forceRefresh);
                        datasets.push(data);
                    }
                    
                    const mergedItems = [];
                    const seenKeys = new Set();
                    const seenSchedules = new Set(); // 🛠️ 코드쉐어 식별용 지문 기록 저장소
                    
                    if (datasets && Array.isArray(datasets)) {
                        datasets.flat().forEach(item => {
                            const sched = item.scheduleDatetime || item.scheduleDateTime;
                            if (!item || !item.flightId || !sched) return;
                            
                            const uniqueKey = `${item.flightId}_${sched}`;
                            if (!seenKeys.has(uniqueKey)) {
                                seenKeys.add(uniqueKey);
                                
                                // 🛠️ [스마트 식별 엔진] 동일 시간대/동일 게이트/동일 목적지 코드쉐어 잡아내기
                                let isSlave = false;
                                if (item.codeshare === 'Y' || item.codeshare === 'True') isSlave = true;
                                if (item.masterflightid && item.masterflightid !== item.flightId) isSlave = true;
                                
                                if (!isSlave) {
                                    const est = item.estimatedDatetime || item.estimatedDateTime || "";
                                    const fingerprint = `${sched}_${item.airport}_${est}_${item.gateNumber || 'nogate'}`;
                                    
                                    if (seenSchedules.has(fingerprint)) {
                                        isSlave = true; // 이미 선행 편명이 있다면 얘는 코드쉐어(중복)로 판별
                                    } else {
                                        seenSchedules.add(fingerprint);
                                    }
                                }
                                // 판별된 결과를 객체에 꼬리표로 부착
                                item.isCodeshare = isSlave;
                                
                                mergedItems.push(item);
                            }
                        });
                    }

                    if (mergedItems.length > 0) {
                        setFlights(mergedItems);
                    }
                } catch (err) {
                    console.error("데이터 병합 코어 에러:", err);
                }
            };

            useEffect(() => {
                fetchFlightData(false);
                const autoRefresh = setInterval(() => fetchFlightData(false), CACHE_DURATION);
                return () => clearInterval(autoRefresh);
            }, []); 

            // 4. 필터링 로직 (코드쉐어 ON/OFF 스위치 작동 반영)
            useEffect(() => {
                if (!flights || flights.length === 0) return;

                const nowTimestamp = currentTime.getTime();
                const sixHoursAgo = nowTimestamp - (6 * 60 * 60 * 1000);   
                const sixHoursLater = nowTimestamp + (6 * 60 * 60 * 1000);  

                const processed = flights.filter(flight => {
                    // 🛠️ [신규 필터] 스위치가 꺼져있고(false), 해당 비행편이 코드쉐어라면 화면에서 제외
                    if (!showCodeshare && flight.isCodeshare) return false;

                    const sched = String(flight.scheduleDatetime || flight.scheduleDateTime || '');
                    if (sched.length < 12) return false;

                    const year = parseInt(sched.slice(0, 4));
                    const month = parseInt(sched.slice(4, 6)) - 1;
                    const day = parseInt(sched.slice(6, 8));
                    const hours = parseInt(sched.slice(8, 10));
                    const minutes = parseInt(sched.slice(10, 12));
                    
                    const flightDate = new Date(year, month, day, hours, minutes);
                    const flightTimestamp = flightDate.getTime();

                    if (flightTimestamp >= nowTimestamp && flightTimestamp <= sixHoursLater) {
                        return true;
                    }

                    if (flightTimestamp >= sixHoursAgo && flightTimestamp < nowTimestamp) {
                        const remark = flight.remark ? String(flight.remark) : "";
                        if (remark.includes("지연") || remark.includes("결항") || remark.includes("마감") || remark.includes("최종") || remark.includes("탑승중") || remark.includes("준비") || remark.includes("대기")) {
                            return true;
                        }
                    }

                    return false;
                });

                processed.sort((a, b) => {
                    const schedA = String(a.scheduleDatetime || a.scheduleDateTime || '');
                    const schedB = String(b.scheduleDatetime || b.scheduleDateTime || '');
                    return schedA.localeCompare(schedB);
                });

                setFilteredFlights(prev => {
                    if (JSON.stringify(prev) === JSON.stringify(processed)) return prev;
                    setCurrentPage(0); // 데이터가 갱신되면 1페이지로 깔끔하게 리셋
                    return processed;
                });
            // 🛠️ showCodeshare 토글 상태가 바뀔 때마다 필터 재계산 발동
            }, [currentTime.getMinutes(), flights, showCodeshare]); 

            const pageData = filteredFlights.slice(currentPage * itemsPerPage, (currentPage + 1) * itemsPerPage);
            const totalPages = Math.min(Math.ceil(filteredFlights.length / itemsPerPage), 10);

            const formatTime = (timeStr) => {
                if (!timeStr) return "--:--";
                const cleanStr = String(timeStr);
                if (cleanStr.length >= 12) {
                    const timePart = cleanStr.slice(8, 12);
                    return `${timePart.slice(0, 2)}:${timePart.slice(2, 4)}`;
                }
                return cleanStr;
            };

            const getPureTimeString = (dateObj) => {
                const hh = String(dateObj.getHours()).padStart(2, '0');
                const mm = String(dateObj.getMinutes()).padStart(2, '0');
                const ss = String(dateObj.getSeconds()).padStart(2, '0');
                return `${hh}:${mm}:${ss}`;
            };

            const parseFlightId = (id) => {
                if (!id) return { code: "---", num: "" };
                const match = id.match(/^([A-Za-z0-9]{2})(\d+.*)$/); 
                if (match) {
                    return { code: match[1].toUpperCase(), num: match[2] };
                }
                return { code: id.toUpperCase(), num: "" };
            };

            const getAirlineCode = (id) => {
                if (!id) return "KE";
                return id.slice(0, 2).toUpperCase();
            };

            const renderStatusAndStyle = (remark) => {
                const status = remark || "정시";
                
                if (status.includes("탑승중")) {
                    return <div className="w-full h-full flex items-center justify-center text-white font-black animate-pulse text-center">탑승중</div>;
                } else if (status.includes("준비") || status.includes("대기")) {
                    return <div className="w-full h-full flex items-center justify-center text-white font-black text-center">탑승준비</div>;
                } else if (status.includes("마감") || status.includes("최종")) {
                    return <div className="w-full h-full flex items-center justify-center text-[#FFD700] font-black animate-pulse text-center">마감예정</div>;
                } else if (status.includes("지연")) {
                    return (
                        <div className="w-full h-full bg-[#FF6D00] flex items-center justify-center text-white font-black text-center mr-[-24px] pr-[24px]">
                            지연
                        </div>
                    );
                } else if (status.includes("결항")) {
                    return (
                        <div className="w-full h-full bg-[#D50000] flex items-center justify-center text-white font-black text-center mr-[-24px] pr-[24px]">
                            결항
                        </div>
                    );
                }

                return <div className="w-full h-full"></div>;
            };

            const renderEstimatedTime = (flight) => {
                const isDelayed = flight.remark && flight.remark.includes("지연");
                if (!isDelayed) return ""; 
                const est = flight.estimatedDatetime || flight.estimatedDateTime || flight.scheduleDatetime || flight.scheduleDateTime;
                return formatTime(est);
            };

            const gridLayoutClass = "grid grid-cols-[100px_100px_minmax(250px,1fr)_240px_140px_180px] min-[1500px]:grid-cols-[100px_100px_minmax(300px,1fr)_240px_160px_140px_180px]";

            return (
                <div className="min-h-screen bg-[#051126] text-[#F8FAFC] flex flex-col justify-between select-none">
                    <div>
                        {/* 🟦 1번째 줄 */}
                        <header className="relative flex items-center bg-[#458cff] px-6 py-[10px] shadow-md z-10">
                            <div className="absolute left-6 flex items-center">
                                <svg className="w-10 h-10 text-white" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                                </svg>
                            </div>

                            <div className="w-full text-center">
                                <span className="text-white text-2xl md:text-3xl font-black tracking-wide font-sans">
                                    출발 Departures
                                </span>
                            </div>
                            
                            <div className="absolute right-6 text-white font-mono text-2xl md:text-3xl font-bold tracking-wider">
                                {getPureTimeString(currentTime)}
                            </div>
                        </header>

                        {/* 📊 2번째 줄 & 3번째 줄 이하 데이터 매트릭스 */}
                        <div className="w-full">
                            {/* ⬛ 2번째 줄 항목 바 */}
                            <div className={`${gridLayoutClass} gap-2 bg-[#000000] border-b border-[#1b2d4a] px-6 py-[10px] text-2xl md:text-3xl font-black text-white uppercase tracking-wider text-center items-center`}>
                                <div>예정</div>
                                <div>변경</div>
                                <div className="text-center">도착지</div>
                                <div>편명</div>
                                <div className="hidden min-[1500px]:block text-[#FACC15] text-center">체크인</div>
                                <div className="text-center">탑승구</div>
                                <div className="text-center">현황</div>
                            </div>

                            {/* 🟦 3번째 줄 이하 데이터 행 */}
                            <div className="divide-y divide-[#162e58]/20 font-mono font-black text-2xl md:text-3xl">
                                {pageData.length > 0 ? (
                                    pageData.map((flight, idx) => {
                                        const rowBgColor = idx % 2 === 0 ? "bg-[#1a62d6]" : "bg-[#134dab]";
                                        const fltInfo = parseFlightId(flight.flightId);
                                        const schedTime = formatTime(flight.scheduleDatetime || flight.scheduleDateTime);
                                        
                                        return (
                                            <div key={idx} className={`${gridLayoutClass} gap-2 px-6 text-center items-center transition-colors ${rowBgColor}`}>
                                                
                                                <div className="text-[#FFFFFF] font-black py-[10px] text-center">{schedTime}</div>
                                                
                                                <div className="text-[#FACC15] font-black py-[10px] text-center">
                                                    {renderEstimatedTime(flight)}
                                                </div>
                                                
                                                <div className="text-left pl-14 font-sans font-black text-[#FFFFFF] truncate py-[10px] tracking-wide">
                                                    {flight.airport || "---"}
                                                </div>
                                                
                                                <div className="flex items-center justify-center font-mono py-[10px]">
                                                    <div className="flex items-center w-[220px] text-left">
                                                        <div className="w-12 shrink-0 flex items-center justify-start">
                                                            <img 
                                                                src={`https://images.kiwi.com/airlines/64/${getAirlineCode(flight.flightId)}.png`}
                                                                alt=""
                                                                onError={(e) => { e.target.style.display = 'none'; }} 
                                                                className="w-10 h-10 object-contain rounded-sm"
                                                            />
                                                        </div>
                                                        <span className="w-16 shrink-0 text-white text-center font-black">{fltInfo.code}</span>
                                                        <span className="text-white font-black pl-3 truncate">{fltInfo.num}</span>
                                                    </div>
                                                </div>
                                                
                                                <div className="hidden min-[1500px]:block text-[#FACC15] tracking-wide font-black py-[10px] text-center">
                                                    {flight.chkinRange || "—"}
                                                </div>
                                                
                                                <div className="text-white font-black py-[10px] text-center">{flight.gateNumber || "—"}</div>
                                                
                                                <div className="font-sans font-black h-full w-full flex items-center justify-center text-center">
                                                    {renderStatusAndStyle(flight.remark)}
                                                </div>
                                            </div>
                                        );
                                    })
                                ) : (
                                    <div className="text-center py-40 text-[#458cff] font-sans font-black text-2xl tracking-widest uppercase bg-[#134dab]/20 col-span-6 min-[1500px]:col-span-7">
                                        실시간 비행 데이터를 불러오는 중입니다...
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 🎛️ 하단 푸터 바: 조작 패널 영역 */}
                    <footer className="mb-4 flex justify-between items-center px-6">
                        <div className="flex items-center">
                            <button onClick={() => fetchFlightData(true)} className="text-[11px] font-bold text-[#1b3a6d] hover:text-[#315ba1] focus:outline-none">
                                [ FLIGHT DATA SYNC ]
                            </button>
                            
                            {/* 🛠️ [신규 기능] 코드쉐어 ON/OFF 토글 스위치 컴포넌트 */}
                            <label className="flex items-center cursor-pointer ml-8 group">
                                <div className="relative">
                                    <input 
                                        type="checkbox" 
                                        className="sr-only" 
                                        checked={showCodeshare}
                                        onChange={() => setShowCodeshare(!showCodeshare)}
                                    />
                                    <div className={`block w-9 h-5 rounded-full transition-colors ${showCodeshare ? 'bg-[#4AF2A1]' : 'bg-[#1b3a6d]'}`}></div>
                                    <div className={`dot absolute left-[2px] top-[2px] bg-white w-4 h-4 rounded-full transition-transform ${showCodeshare ? 'transform translate-x-4' : ''}`}></div>
                                </div>
                                <div className={`ml-3 font-mono font-bold text-[11px] tracking-wider transition-colors ${showCodeshare ? 'text-[#4AF2A1]' : 'text-[#1b3a6d] group-hover:text-[#315ba1]'}`}>
                                    CODESHARE
                                </div>
                            </label>
                        </div>
                        
                        {totalPages > 1 && (
                            <div className="text-white font-mono font-black text-2xl md:text-3xl tracking-widest">
                                PAGE {currentPage + 1} / {totalPages}
                            </div>
                        )}
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render((<App />));
    </script>
</body>
</html>
