<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departures</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Roboto+Mono:wght@700&display=swap');
        
        /* 1. 전체 글꼴 '돋움(Dotum)' 지정 및 초고두께 볼드 설정 */
        body { 
            font-family: 'Dotum', '돋움', 'Apple SD Gothic Neo', sans-serif; 
            font-weight: 900;
            background-color: #051126;
        }
        .font-mono { 
            font-family: 'Roboto Mono', 'Inter', monospace; 
            font-weight: 700;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-white antialiased select-none">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SERVICE_KEY = "ca528dec987f974b71365a40543ca4c094fa0a3afe15441db4136e49edc7c72c";
        const CACHE_DURATION = 10 * 60 * 1000; 

        function App() {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [flights, setFlights] = useState([]);
            const [filteredFlights, setFilteredFlights] = useState([]);
            const [currentPage, setCurrentPage] = useState(0);
            const [showCodeshare, setShowCodeshare] = useState(false);

            // 🛠️ [5. 화면 커스텀 관련 핵심 상태 변수들]
            const [itemsPerPage, setItemsPerPage] = useState(11); // 5-1. 화면 표시 줄 개수
            const [rowHeight, setRowHeight] = useState(55);       // 5-2. 줄의 높이 (px)
            const [maxPages, setMaxPages] = useState(10);         // 5-3. 최대 출력 페이지수
            const [showCheckin, setShowCheckin] = useState(true); // 5-4. 체크인 표시 여부
            const [showTerminal, setShowTerminal] = useState(true); // 5-4. 터미널 표시 여부
            const [showConfig, setShowConfig] = useState(false);   // 커스텀 제어판 열기/닫기

            // 실시간 브라우저 가로폭 감지 (반응형 안전장치)
            const [windowWidth, setWindowWidth] = useState(window.innerWidth);

            const filteredFlightsRef = useRef([]);
            useEffect(() => {
                filteredFlightsRef.current = filteredFlights;
            }, [filteredFlights]);

            useEffect(() => {
                const handleResize = () => setWindowWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                const clockTimer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(clockTimer);
            }, []);

            useEffect(() => {
                const pageTimer = setInterval(() => {
                    const totalItems = filteredFlightsRef.current.length;
                    if (totalItems > 0) {
                        const actualMaxPage = Math.ceil(totalItems / itemsPerPage);
                        const maxPageLimit = Math.min(actualMaxPage, maxPages); 
                        
                        setCurrentPage(p => (p + 1) % (maxPageLimit || 1));
                    }
                }, 10000); 

                return () => clearInterval(pageTimer);
            }, [itemsPerPage, maxPages]);

            const getFormattedDate = (dateObj) => {
                const year = dateObj.getFullYear();
                const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                const day = String(dateObj.getDate()).padStart(2, '0');
                return `${year}${month}${day}`;
            };

            const fetchSingleDayData = async (dateStr, forceRefresh) => {
                const cacheKey = `fids_raw_data_${dateStr}`;
                const cachedTimeKey = `fids_raw_time_${dateStr}`;
                const cachedData = localStorage.getItem(cacheKey);
                const cachedTime = localStorage.getItem(cachedTimeKey);
                const nowTimestamp = Date.now();

                if (!forceRefresh && cachedData && cachedTime && (nowTimestamp - cachedTime < CACHE_DURATION)) {
                    try {
                        const parsed = JSON.parse(cachedData);
                        if (parsed && parsed.length > 0) return parsed;
                    } catch(e) {}
                }

                try {
                    const params = new URLSearchParams({
                        serviceKey: SERVICE_KEY,
                        type: 'json',
                        numOfRows: '1500', 
                        pageNo: '1',
                        searchDate: dateStr,     
                        searchdtCode: 'S',        
                        passengerOrCargo: 'P'     
                    });
                    const targetUrl = `/api/icn/B551177/statusOfAllFltDeOdp/getFltDeparturesDeOdp?${params.toString()}`;
                    const response = await fetch(targetUrl);
                    if (!response.ok) throw new Error("API Network Error");
                    
                    const data = await response.json();
                    if (data?.response?.header?.resultCode !== "00") throw new Error("API Data Error");
                    
                    const rawItems = data?.response?.body?.items || [];
                    const itemList = Array.isArray(rawItems) ? rawItems : [];
                    
                    if (itemList.length > 0) {
                        localStorage.setItem(cacheKey, JSON.stringify(itemList));
                        localStorage.setItem(cachedTimeKey, nowTimestamp.toString());
                        return itemList;
                    }
                    return [];
                } catch (err) {
                    console.error(`데이터 호출 실패 (${dateStr}):`, err);
                    try {
                        const backup = JSON.parse(cachedData);
                        if (backup && backup.length > 0) return backup;
                    } catch(e) {}
                    return [];
                }
            };

            const fetchFlightData = async (forceRefresh = false) => {
                const now = new Date();
                const currentHour = now.getHours();
                
                const todayStr = getFormattedDate(now);
                const yesterdayStr = getFormattedDate(new Date(now.getTime() - 24 * 60 * 60 * 1000));
                const tomorrowStr = getFormattedDate(new Date(now.getTime() + 24 * 60 * 60 * 1000));

                let targetDates = [todayStr];
                if (currentHour >= 0 && currentHour < 6) {
                    targetDates.unshift(yesterdayStr); 
                } else if (currentHour >= 18 && currentHour <= 23) {
                    targetDates.push(tomorrowStr);    
                }

                try {
                    const datasets = [];
                    for (const date of targetDates) {
                        const data = await fetchSingleDayData(date, forceRefresh);
                        datasets.push(data);
                    }
                    
                    const mergedItems = [];
                    const seenKeys = new Set();
                    const seenSchedules = new Set(); 
                    
                    if (datasets && Array.isArray(datasets)) {
                        datasets.flat().forEach(item => {
                            const sched = item.scheduleDatetime || item.scheduleDateTime;
                            if (!item || !item.flightId || !sched) return;
                            
                            const uniqueKey = `${item.flightId}_${sched}`;
                            if (!seenKeys.has(uniqueKey)) {
                                seenKeys.add(uniqueKey);
                                
                                let isSlave = false;
                                if (item.codeshare === 'Y' || item.codeshare === 'True') isSlave = true;
                                if (item.masterflightid && item.masterflightid !== item.flightId) isSlave = true;
                                
                                if (!isSlave) {
                                    const est = item.estimatedDatetime || item.estimatedDateTime || "";
                                    const fingerprint = `${sched}_${item.airport}_${est}_${item.gateNumber || 'nogate'}`;
                                    
                                    if (seenSchedules.has(fingerprint)) {
                                        isSlave = true; 
                                    } else {
                                        seenSchedules.add(fingerprint);
                                    }
                                }
                                item.isCodeshare = isSlave;
                                mergedItems.push(item);
                            }
                        });
                    }

                    if (mergedItems.length > 0) {
                        setFlights(mergedItems);
                    }
                } catch (err) {
                    console.error("데이터 병합 코어 에러:", err);
                }
            };

            useEffect(() => {
                fetchFlightData(false);
                const autoRefresh = setInterval(() => fetchFlightData(false), CACHE_DURATION);
                return () => clearInterval(autoRefresh);
            }, []); 

            useEffect(() => {
                if (!flights || flights.length === 0) return;

                const nowTimestamp = currentTime.getTime();
                const sixHoursAgo = nowTimestamp - (6 * 60 * 60 * 1000);   
                const sixHoursLater = nowTimestamp + (6 * 60 * 60 * 1000);  

                const processed = flights.filter(flight => {
                    if (!showCodeshare && flight.isCodeshare) return false;

                    const sched = String(flight.scheduleDatetime || flight.scheduleDateTime || '');
                    if (sched.length < 12) return false;

                    const year = parseInt(sched.slice(0, 4));
                    const month = parseInt(sched.slice(4, 6)) - 1;
                    const day = parseInt(sched.slice(6, 8));
                    const hours = parseInt(sched.slice(8, 10));
                    const minutes = parseInt(sched.slice(10, 12));
                    
                    const flightDate = new Date(year, month, day, hours, minutes);
                    const flightTimestamp = flightDate.getTime();

                    if (flightTimestamp >= nowTimestamp && flightTimestamp <= sixHoursLater) {
                        return true;
                    }

                    if (flightTimestamp >= sixHoursAgo && flightTimestamp < nowTimestamp) {
                        const remark = flight.remark ? String(flight.remark) : "";
                        if (remark.includes("지연") || remark.includes("결항") || remark.includes("마감") || remark.includes("최종") || remark.includes("탑승중") || remark.includes("준비") || remark.includes("대기")) {
                            return true;
                        }
                    }

                    return false;
                });

                processed.sort((a, b) => {
                    const schedA = String(a.scheduleDatetime || a.scheduleDateTime || '');
                    const schedB = String(b.scheduleDatetime || b.scheduleDateTime || '');
                    return schedA.localeCompare(schedB);
                });

                setFilteredFlights(prev => {
                    if (JSON.stringify(prev) === JSON.stringify(processed)) return prev;
                    setCurrentPage(0); 
                    return processed;
                });
            }, [currentTime.getMinutes(), flights, showCodeshare]); 

            const pageData = filteredFlights.slice(currentPage * itemsPerPage, (currentPage + 1) * itemsPerPage);
            const totalPages = Math.min(Math.ceil(filteredFlights.length / itemsPerPage), maxPages);

            const formatTime = (timeStr) => {
                if (!timeStr) return "--:--";
                const cleanStr = String(timeStr);
                if (cleanStr.length >= 12) {
                    const timePart = cleanStr.slice(8, 12);
                    return `${timePart.slice(0, 2)}:${timePart.slice(2, 4)}`;
                }
                return cleanStr;
            };

            const getPureTimeString = (dateObj) => {
                const hh = String(dateObj.getHours()).padStart(2, '0');
                const mm = String(dateObj.getMinutes()).padStart(2, '0');
                const ss = String(dateObj.getSeconds()).padStart(2, '0');
                return `${hh}:${mm}:${ss}`;
            };

            const parseFlightId = (id) => {
                if (!id) return { code: "---", num: "" };
                const match = id.match(/^([A-Za-z0-9]{2})(\d+.*)$/); 
                if (match) {
                    return { code: match[1].toUpperCase(), num: match[2] };
                }
                return { code: id.toUpperCase(), num: "" };
            };

            const getAirlineCode = (id) => {
                if (!id) return "KE";
                return id.slice(0, 2).toUpperCase();
            };

            const getTerminalInfo = (gateNumber, terminalId) => {
                if (!gateNumber) return terminalId || "T1";
                const gate = parseInt(gateNumber, 10);
                if (isNaN(gate)) return terminalId || "T1";
                if (gate >= 1 && gate <= 199) return "T1";
                if (gate >= 200 && gate <= 299) return "T2";
                return terminalId || "T1";
            };

            const renderStatusAndStyle = (remark) => {
                const status = remark || "정시";
                const baseClass = "w-full h-full flex items-center justify-center font-black text-center pr-6 ";
                
                if (status.includes("탑승중")) {
                    return <div className={`${baseClass} text-white animate-pulse`}>탑승중</div>;
                } else if (status.includes("준비") || status.includes("대기")) {
                    return <div className={`${baseClass} text-white`}>탑승준비</div>;
                } else if (status.includes("마감") || status.includes("최종")) {
                    return <div className={`${baseClass} text-[#FFD700] animate-pulse`}>마감예정</div>;
                } else if (status.includes("지연")) {
                    return <div className={`${baseClass} bg-[#FF6D00] text-white`}>지연</div>;
                } else if (status.includes("결항")) {
                    return <div className={`${baseClass} bg-[#D50000] text-white`}>결항</div>;
                }

                return <div className={baseClass}></div>;
            };

            const renderEstimatedTime = (flight) => {
                const isDelayed = flight.remark && flight.remark.includes("지연");
                if (!isDelayed) return ""; 
                const est = flight.estimatedDatetime || flight.estimatedDateTime || flight.scheduleDatetime || flight.scheduleDateTime;
                return formatTime(est);
            };

            const isWideScreen = windowWidth >= 1500;
            const displayTerminalActive = showTerminal && isWideScreen;
            const displayCheckinActive = showCheckin && isWideScreen;

            let gridColsStructure = "110px 110px minmax(220px, 1fr) 240px";
            if (displayTerminalActive) gridColsStructure += " 110px";
            if (displayCheckinActive) gridColsStructure += " 160px";
            gridColsStructure += " 140px 180px";

            const dynamicGridStyle = {
                display: "grid",
                gridTemplateColumns: gridColsStructure,
                alignItems: "stretch", 
                height: `${rowHeight}px`
            };

            const dynamicFontStyle = {
                fontSize: `${rowHeight * 0.43}px`,
                lineHeight: `${rowHeight}px`
            };

            return (
                <div className="min-h-screen bg-[#051126] text-[#F8FAFC] flex flex-col justify-between select-none">
                    <div>
                        {/* 🟦 1번째 줄 (헤더) */}
                        <header className="relative flex items-center bg-[#458cff] shadow-md z-10" style={{ height: `${rowHeight + 10}px` }}>
                            <div className="absolute left-6 flex items-center">
                                <svg style={{ width: `${rowHeight * 0.7}px`, height: `${rowHeight * 0.7}px` }} className="text-white" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                                </svg>
                            </div>

                            <div className="w-full text-center">
                                <span className="text-white font-black tracking-wide font-sans" style={{ fontSize: `${rowHeight * 0.5}px` }}>
                                    출발 Departures
                                </span>
                            </div>
                            
                            <div className="absolute right-6 text-white font-mono font-bold tracking-wider" style={{ fontSize: `${rowHeight * 0.5}px` }}>
                                {getPureTimeString(currentTime)}
                            </div>
                        </header>

                        {/* 📊 2번째 줄 & 3번째 줄 이하 데이터 매트릭스 */}
                        <div className="w-full">
                            {/* ⬛ 2번째 줄 항목 바 (예정 -> 시간으로 변경) */}
                            <div style={dynamicGridStyle} className="bg-[#000000] border-b border-[#1b2d4a] text-white uppercase tracking-wider text-center font-black">
                                <div className="pl-6 flex items-center justify-center">시간</div>
                                <div className="flex items-center justify-center">변경</div>
                                <div className="text-center flex items-center justify-center">도착지</div>
                                <div className="flex items-center justify-center">편명</div>
                                
                                {displayTerminalActive && <div className="text-white flex items-center justify-center">터미널</div>}
                                {displayCheckinActive && <div className="text-white flex items-center justify-center">체크인</div>}
                                
                                <div className="flex items-center justify-center">탑승구</div>
                                <div className="pr-6 flex items-center justify-center">현황</div>
                            </div>

                            {/* 🟦 3번째 줄 이하 실시간 데이터 행 */}
                            <div className="divide-y divide-[#162e58]/20 font-mono font-black" style={dynamicFontStyle}>
                                {pageData.length > 0 ? (
                                    pageData.map((flight, idx) => {
                                        const rowBgColor = idx % 2 === 0 ? "bg-[#1a62d6]" : "bg-[#134dab]";
                                        const fltInfo = parseFlightId(flight.flightId);
                                        const schedTime = formatTime(flight.scheduleDatetime || flight.scheduleDateTime);
                                        
                                        return (
                                            <div key={idx} style={dynamicGridStyle} className={`text-center items-center transition-colors ${rowBgColor}`}>
                                                
                                                <div className="text-[#FFFFFF] font-black text-center pl-6 flex items-center justify-center">{schedTime}</div>
                                                
                                                <div className="text-[#FACC15] font-black text-center flex items-center justify-center">
                                                    {renderEstimatedTime(flight)}
                                                </div>
                                                
                                                <div className="text-left pl-14 font-sans font-black text-[#FFFFFF] truncate tracking-wide flex items-center">
                                                    {flight.airport || "---"}
                                                </div>
                                                
                                                <div className="flex items-center justify-center font-mono h-full">
                                                    <div className="flex items-center w-[220px] text-left h-full">
                                                        <div className="w-14 shrink-0 flex items-center justify-start h-full py-[2px]">
                                                            <img 
                                                                src={`https://images.kiwi.com/airlines/64/${getAirlineCode(flight.flightId)}.png`}
                                                                alt=""
                                                                onError={(e) => { e.target.style.display = 'none'; }} 
                                                                style={{ height: `${rowHeight * 0.88}px`, width: `${rowHeight * 0.88}px` }}
                                                                className="object-contain rounded-sm"
                                                            />
                                                        </div>
                                                        <span className="w-16 shrink-0 text-white text-center font-black">{fltInfo.code}</span>
                                                        <span className="text-white font-black pl-3 truncate">{fltInfo.num}</span>
                                                    </div>
                                                </div>
                                                
                                                {displayTerminalActive && (
                                                    <div className="text-[#4AF2A1] tracking-wide font-black text-center flex items-center justify-center">
                                                        {getTerminalInfo(flight.gateNumber, flight.terminalId)}
                                                    </div>
                                                )}
                                                
                                                {displayCheckinActive && (
                                                    <div className="text-[#FACC15] tracking-wide font-black text-center flex items-center justify-center">
                                                        {flight.chkinRange || "—"}
                                                    </div>
                                                )}
                                                
                                                <div className="text-white font-black text-center flex items-center justify-center">{flight.gateNumber || "—"}</div>
                                                
                                                <div className="font-sans font-black h-full w-full flex items-center justify-center">
                                                    {renderStatusAndStyle(flight.remark)}
                                                </div>
                                            </div>
                                        );
                                    })
                                ) : (
                                    <div className="text-center py-40 text-[#458cff] font-sans font-black text-2xl tracking-widest uppercase bg-[#134dab]/20">
                                        실시간 비행 데이터를 불러오는 중입니다...
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 🎛️ 하단 관제 커스텀 제어 스위치 패널 통합 영역 */}
                    <div className="flex flex-col bg-[#030b1a]/90 border-t border-[#162e58]/50 shadow-2xl transition-all duration-300">
                        
                        {showConfig && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 px-8 py-6 bg-[#041430] text-sm text-slate-300 font-sans border-b border-[#162e58]/30">
                                <div className="flex flex-col space-y-2">
                                    <div className="flex justify-between font-bold">
                                        <span>출력 항공편 수 (줄 개수)</span>
                                        <span className="text-[#4AF2A1]">{itemsPerPage} 행</span>
                                    </div>
                                    <input type="range" min="5" max="20" value={itemsPerPage} onChange={(e) => setItemsPerPage(parseInt(e.target.value))} className="w-full accent-[#458cff] bg-[#051126] h-2 rounded-lg appearance-none cursor-pointer" />
                                    
                                    <div className="flex justify-between font-bold pt-2">
                                        <span>최대 출력 페이지수 (제한)</span>
                                        <span className="text-[#4AF2A1]">{maxPages} P</span>
                                    </div>
                                    <input type="range" min="1" max="30" value={maxPages} onChange={(e) => setMaxPages(parseInt(e.target.value))} className="w-full accent-[#458cff] bg-[#051126] h-2 rounded-lg appearance-none cursor-pointer" />
                                </div>

                                <div className="flex flex-col space-y-2 justify-center">
                                    <div className="flex justify-between font-bold">
                                        <span>전광판 줄 높이 (폰트 자동 비례)</span>
                                        <span className="text-[#4AF2A1]">{rowHeight} px</span>
                                    </div>
                                    <input type="range" min="40" max="95" value={rowHeight} onChange={(e) => setRowHeight(parseInt(e.target.value))} className="w-full accent-[#458cff] bg-[#051126] h-2 rounded-lg appearance-none cursor-pointer" />
                                </div>

                                <div className="flex flex-col space-y-3 justify-center pl-4">
                                    <span className="font-bold block text-xs tracking-wider text-slate-400">컬럼 노출 제어 (1500px 이상 와이드 전용)</span>
                                    <div className="flex space-x-6">
                                        <label className="flex items-center cursor-pointer group">
                                            <input type="checkbox" checked={showTerminal} onChange={() => setShowTerminal(!showTerminal)} className="sr-only" />
                                            <div className={`w-8 h-4 rounded-full transition-colors ${showTerminal ? 'bg-[#4AF2A1]' : 'bg-slate-600'}`}></div>
                                            <span className="ml-2 text-xs font-bold">터미널</span>
                                        </label>
                                        <label className="flex items-center cursor-pointer group">
                                            <input type="checkbox" checked={showCheckin} onChange={() => setShowCheckin(!showCheckin)} className="sr-only" />
                                            <div className={`w-8 h-4 rounded-full transition-colors ${showCheckin ? 'bg-[#4AF2A1]' : 'bg-slate-600'}`}></div>
                                            <span className="ml-2 text-xs font-bold">체크인</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        )}

                        <footer className="py-4 flex justify-between items-center px-6">
                            <div className="flex items-center space-x-8">
                                <button onClick={() => fetchFlightData(true)} className="text-[11px] font-bold text-[#1b3a6d] hover:text-[#315ba1] focus:outline-none">
                                    [ FLIGHT DATA SYNC ]
                                </button>
                                
                                <label className="flex items-center cursor-pointer group">
                                    <div className="relative">
                                        <input type="checkbox" className="sr-only" checked={showCodeshare} onChange={() => setShowCodeshare(!showCodeshare)} />
                                        <div className={`block w-9 h-5 rounded-full transition-colors ${showCodeshare ? 'bg-[#4AF2A1]' : 'bg-[#1b3a6d]'}`}></div>
                                        <div className={`dot absolute left-[2px] top-[2px] bg-white w-4 h-4 rounded-full transition-transform ${showCodeshare ? 'transform translate-x-4' : ''}`}></div>
                                    </div>
                                    <div className={`ml-3 font-mono font-bold text-[11px] tracking-wider transition-colors ${showCodeshare ? 'text-[#4AF2A1]' : 'text-[#1b3a6d] group-hover:text-[#315ba1]'}`}>
                                        CODESHARE
                                    </div>
                                </label>

                                <button onClick={() => setShowConfig(!showConfig)} className={`text-[11px] font-bold px-3 py-1 rounded border border-[#1b3a6d]/40 transition-colors ${showConfig ? 'bg-[#458cff] text-white border-transparent' : 'text-[#2e599e] hover:bg-[#162e58]/20'}`}>
                                    {showConfig ? "[ CUSTOM PANEL CLOSE ]" : "[ CUSTOM PANEL OPEN ]"}
                                </button>
                            </div>
                            
                            {totalPages > 1 && (
                                <div className="text-white font-mono font-black text-2xl md:text-3xl tracking-widest">
                                    PAGE {currentPage + 1} / {totalPages}
                                </div>
                            )}
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render((<App />));
    </script>
</body>
</html>
